# ilmora.net.conf — FileDrop Personal File Server
# DNS-only (no Cloudflare proxy) — uses Let's Encrypt certificate.
# Proxies to filedrop container on host port 3006.

server {
    listen 80;
    server_name ilmora.net www.ilmora.net;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /etc/nginx/ssl/acme-challenge;
    }

    location / {
        return 301 https://ilmora.net$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ilmora.net www.ilmora.net;

    ssl_certificate     /etc/nginx/ssl/ilmora.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ilmora.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Large file support
    client_max_body_size    15g;
    client_body_timeout     3600s;
    client_body_buffer_size 128k;

    location / {
        proxy_pass         http://172.17.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stream uploads directly — don't buffer in nginx temp files
        proxy_request_buffering off;

        proxy_connect_timeout 30s;
        proxy_read_timeout    21600s;
        proxy_send_timeout    21600s;
    }
}
