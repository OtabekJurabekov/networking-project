services:
  filedrop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: networking-shop
    restart: unless-stopped
    ports:
      - "3006:3000"
    volumes:
      - /opt/networking-project/uploads:/app/uploads
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
