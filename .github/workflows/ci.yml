name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t filedrop:ci .

      - name: Start container
        run: |
          docker run -d --name filedrop-ci \
            -p 3099:3000 \
            -e AUTH_EMAIL=test@test.com \
            -e AUTH_PASSWORD_HASH='$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LeuKuT2aOJRUHLXCu' \
            -e SESSION_SECRET=ci-test-secret \
            filedrop:ci
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:3099/health
          echo "Health check passed"

      - name: Verify login page loads
        run: |
          curl -f -sI http://localhost:3099/ | grep "200"
          echo "Login page returns HTTP 200"

      - name: Cleanup
        if: always()
        run: docker rm -f filedrop-ci || true
