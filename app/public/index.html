<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileDrop — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #030712;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Blobs */
    .bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .blob { position: absolute; border-radius: 50%; filter: blur(100px); animation: float 10s ease-in-out infinite; }
    .b1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,.35), transparent 70%); top:-200px; left:-150px; }
    .b2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,.28), transparent 70%); bottom:-100px; right:-150px; animation-delay: -5s; }
    .b3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(6,182,212,.2), transparent 70%); top:40%; left:40%; animation-delay: -3s; }
    @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-15px) scale(1.04)} 66%{transform:translate(-15px,10px) scale(0.97)} }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      margin: 1rem;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(99,102,241,.4);
      font-size: 20px;
    }
    .logo-text { font-size: 1.4rem; font-weight: 700; color: #f8fafc; letter-spacing: -.02em; }

    h1 { font-size: 1.1rem; font-weight: 600; text-align: center; color: #e2e8f0; margin-bottom: 6px; }
    .sub { font-size: .85rem; color: #64748b; text-align: center; margin-bottom: 32px; }

    /* Form */
    label { display: block; font-size: .78rem; font-weight: 600; color: #94a3b8; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
    .field { margin-bottom: 18px; }

    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 13px 16px;
      color: #f8fafc;
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .25s, box-shadow .25s, background .25s;
      outline: none;
    }
    input:focus {
      border-color: rgba(99,102,241,.6);
      background: rgba(99,102,241,.06);
      box-shadow: 0 0 0 4px rgba(99,102,241,.12);
    }
    input::placeholder { color: #334155; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 14px;
      color: #fff; font-size: .95rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      margin-top: 8px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.5); }
    .btn:active { transform: translateY(0); }

    .error {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: .83rem;
      color: #fca5a5;
      margin-bottom: 18px;
      text-align: center;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">📁</div>
      <span class="logo-text">FileDrop</span>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to access your files</p>

    <div id="err" class="error"></div>

    <form action="/login" method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const errEl  = document.getElementById('err');
    const msgs   = { invalid: 'Incorrect email or password.', missing: 'Please enter email and password.', session: 'Session expired. Please sign in again.', server: 'Server error. Try again.' };
    if (params.get('error')) {
      errEl.textContent = msgs[params.get('error')] || 'Authentication failed.';
      errEl.classList.add('show');
    }
  </script>
</body>
</html>
